name: Update FAA airports_v2 dataset

on:
  schedule:
    - cron: "18 8 * * 5"   # Friday 08:18 UTC
  workflow_dispatch:

concurrency:
  group: update-faa-airports-v2
  cancel-in-progress: false

jobs:
  update-airports-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 psycopg[binary]

      - name: Run FAA airport database update
        run: |
          python xc_airport_json.py

      - name: Clean temporary files
        if: always()
        run: |
          rm -rf json_data/tmp || true
          rm -rf 28DaySubscription_Effective_* || true
